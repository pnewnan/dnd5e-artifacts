<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aelenthor — Campaign Navigation</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f2e8c9;
    --parchment-dark: #dbc99a;
    --parchment-shadow: #b89d5e;
    --ink: #1a1108;
    --dim: #2e200e;
    --faded: #5a4a2e;
    --blood: #7a1f1f;
    --purple: #5b2d8e;
    --gold: #8a6a10;
    --teal: #1e5f5f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1209;
    background-image: radial-gradient(ellipse at 30% 0%, #2a1a08 0%, transparent 60%), radial-gradient(ellipse at 70% 100%, #0e1520 0%, transparent 60%);
    font-family: 'IM Fell English', serif;
    color: var(--ink);
    padding: 2rem 1rem 4rem;
    min-height: 100vh;
  }
  .page {
    max-width: 860px;
    margin: 0 auto;
    background-color: #f2e8c9;
    border: 2px solid var(--parchment-shadow);
    box-shadow: 0 0 0 6px #1a1209, 0 0 0 8px var(--parchment-shadow), 0 20px 60px rgba(0,0,0,0.8);
    padding: 2.5rem 2.5rem 3rem;
  }
  .page-title {
    text-align: center;
    border-bottom: 2px solid var(--parchment-shadow);
    padding-bottom: 1rem;
    margin-bottom: 2rem;
  }
  .page-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--blood);
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.3rem;
  }
  .page-title h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--ink);
    line-height: 1.2;
  }
  .page-title .subtitle {
    font-style: italic;
    color: var(--faded);
    font-size: 0.9rem;
    margin-top: 0.4rem;
  }

  /* Accordion section */
  .acc-section { margin-bottom: 0.6rem; border: 1px solid rgba(180,140,60,0.2); }
  .acc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.65rem 1rem;
    cursor: pointer;
    background: rgba(180,140,60,0.06);
    border-bottom: 1px solid transparent;
    transition: background 0.15s;
    user-select: none;
  }
  .acc-header:hover { background: rgba(180,140,60,0.12); }
  .acc-header.open { background: rgba(180,140,60,0.1); border-bottom-color: rgba(180,140,60,0.2); }
  .acc-title {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--purple);
  }
  .acc-chevron {
    font-size: 0.65rem;
    color: var(--parchment-shadow);
    transition: transform 0.22s ease;
    line-height: 1;
  }
  .acc-header.open .acc-chevron { transform: rotate(180deg); }

  .acc-body {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.28s ease, padding 0.2s ease;
  }
  .acc-body.open { max-height: 1200px; }
  .acc-entries {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0.5rem 0.6rem 0.6rem;
  }

  /* Entries */
  .nav-entry {
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
    padding: 0.5rem 0.75rem;
    border: 1px solid rgba(180,140,60,0.18);
    border-top: none;
    background: rgba(242,232,200,0.4);
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .acc-entries .nav-entry:first-child { border-top: 1px solid rgba(180,140,60,0.18); }
  .nav-entry:hover { background: rgba(180,140,60,0.13); border-color: var(--parchment-shadow); }
  .nav-entry.player { border-left: 3px solid var(--teal); }
  .nav-entry.gm     { border-left: 3px solid var(--blood); }
  .nav-entry.asset  { border-left: 3px solid var(--gold); }

  .nav-tag {
    font-family: 'Cinzel', serif;
    font-size: 0.52rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.08rem 0.35rem;
    border-radius: 2px;
    flex-shrink: 0;
    white-space: nowrap;
    align-self: center;
  }
  .tag-player { background: rgba(30,95,95,0.1);   color: var(--teal);  border: 1px solid rgba(30,95,95,0.25); }
  .tag-gm     { background: rgba(122,31,31,0.1);  color: var(--blood); border: 1px solid rgba(122,31,31,0.25); }
  .tag-asset  { background: rgba(138,106,16,0.1); color: var(--gold);  border: 1px solid rgba(138,106,16,0.25); }

  .nav-entry-text { flex: 1; min-width: 0; }
  .nav-entry-name {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--ink);
    display: block;
    letter-spacing: 0.03em;
  }
  .nav-entry-desc {
    font-style: italic;
    font-size: 0.77rem;
    color: var(--faded);
    display: block;
    margin-top: 0.08rem;
    line-height: 1.35;
  }
  .nav-arrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--parchment-shadow);
    flex-shrink: 0;
    align-self: center;
    transition: color 0.15s, transform 0.15s;
  }
  .nav-entry:hover .nav-arrow { color: var(--blood); transform: translateX(3px); }

  .loading { text-align: center; font-style: italic; color: var(--faded); padding: 2rem 0; font-size: 0.9rem; }
  @media (max-width: 600px) { .page { padding: 1.5rem 1rem 2rem; } }
</style>
</head>
<body>
<div class="page">
  <div class="page-title">
    <span class="page-label">Campaign Reference</span>
    <h1>Aelenthor</h1>
    <p class="subtitle">All Pages · Select a section to expand</p>
  </div>
  <div id="navRoot"><p class="loading">Loading…</p></div>
</div>

<script>
  const BASE = 'https://pnewnan.github.io/dnd5e-artifacts/';

  fetch(BASE + 'nav.json')
    .then(function(r) { return r.json(); })
    .then(renderIndex)
    .catch(function() {
      document.getElementById('navRoot').innerHTML = '<p class="loading">Navigation unavailable — check console.</p>';
    });

  function renderIndex(data) {
    var html = '';
    data.sections.forEach(function(sec, i) {
      var id = 'acc' + i;
      html += '<div class="acc-section">'
            + '<div class="acc-header open" id="hdr' + i + '" onclick="toggleAcc(' + i + ')">'
            + '<span class="acc-title">' + sec.title + '</span>'
            + '<span class="acc-chevron">▲</span>'
            + '</div>'
            + '<div class="acc-body open" id="body' + i + '">'
            + '<div class="acc-entries">';
      sec.entries.forEach(function(e) {
        var tgt = e.type === 'asset' ? ' target="_blank"' : '';
        html += '<a class="nav-entry ' + e.type + '" href="' + BASE + e.href + '"' + tgt + '>'
              + '<span class="nav-tag tag-' + e.type + '">' + e.type + '</span>'
              + '<div class="nav-entry-text">'
              + '<span class="nav-entry-name">' + e.name + '</span>'
              + '<span class="nav-entry-desc">' + e.desc + '</span>'
              + '</div>'
              + '<span class="nav-arrow">→</span>'
              + '</a>';
      });
      html += '</div></div></div>';
    });
    document.getElementById('navRoot').innerHTML = html;
  }

  function toggleAcc(i) {
    var hdr  = document.getElementById('hdr'  + i);
    var body = document.getElementById('body' + i);
    var isOpen = body.classList.contains('open');
    if (isOpen) {
      body.classList.remove('open');
      hdr.classList.remove('open');
    } else {
      body.classList.add('open');
      hdr.classList.add('open');
    }
  }
</script>
</body>
</html>
