<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aelenthor — DM Navigation</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f2e8c9;
    --parchment-dark: #dbc99a;
    --parchment-shadow: #b89d5e;
    --ink: #1a1108;
    --dim: #2e200e;
    --faded: #5a4a2e;
    --blood: #7a1f1f;
    --purple: #5b2d8e;
    --gold: #8a6a10;
    --teal: #1e5f5f;
    --dc-low: #2a5c1e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1209;
    background-image: radial-gradient(ellipse at 30% 0%, #2a1a08 0%, transparent 60%), radial-gradient(ellipse at 70% 100%, #0e1520 0%, transparent 60%);
    font-family: 'IM Fell English', serif;
    color: var(--ink);
    padding: 2rem 1rem 4rem;
    min-height: 100vh;
  }
  .page {
    max-width: 860px;
    margin: 0 auto;
    background-color: #f2e8c9;
    border: 2px solid var(--parchment-shadow);
    box-shadow: 0 0 0 6px #1a1209, 0 0 0 8px var(--parchment-shadow), 0 20px 60px rgba(0,0,0,0.8);
    padding: 2.5rem 2.5rem 3rem;
  }
  .page-title {
    text-align: center;
    border-bottom: 2px solid var(--parchment-shadow);
    padding-bottom: 1rem;
    margin-bottom: 2rem;
  }
  .gm-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--blood);
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.3rem;
  }
  .page-title h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--ink);
    line-height: 1.2;
  }
  .page-title .subtitle {
    font-style: italic;
    color: var(--faded);
    font-size: 0.9rem;
    margin-top: 0.4rem;
  }
  .nav-section { margin-bottom: 2rem; }
  .nav-section-head {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--purple);
    border-bottom: 1px solid rgba(91,45,142,0.2);
    padding-bottom: 0.3rem;
    margin-bottom: 0.8rem;
  }
  .nav-entries { display: flex; flex-direction: column; gap: 0.4rem; }
  .nav-entry {
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
    padding: 0.55rem 0.9rem;
    border: 1px solid rgba(180,140,60,0.25);
    background: rgba(180,140,60,0.05);
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }
  .nav-entry:hover { background: rgba(180,140,60,0.12); border-color: var(--parchment-shadow); }
  .nav-entry.player { border-left: 3px solid var(--teal); }
  .nav-entry.gm     { border-left: 3px solid var(--blood); }
  .nav-entry.asset  { border-left: 3px solid var(--gold); }
  .nav-tag {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .tag-player { background: rgba(30,95,95,0.1);  color: var(--teal);   border: 1px solid rgba(30,95,95,0.25); }
  .tag-gm     { background: rgba(122,31,31,0.1); color: var(--blood);  border: 1px solid rgba(122,31,31,0.25); }
  .tag-asset  { background: rgba(138,106,16,0.1);color: var(--gold);   border: 1px solid rgba(138,106,16,0.25); }
  .nav-entry-text { flex: 1; min-width: 0; }
  .nav-entry-name {
    font-family: 'Cinzel', serif;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--ink);
    display: block;
    letter-spacing: 0.03em;
  }
  .nav-entry-desc {
    font-style: italic;
    font-size: 0.8rem;
    color: var(--faded);
    display: block;
    margin-top: 0.1rem;
    line-height: 1.4;
  }
  .nav-arrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--parchment-shadow);
    flex-shrink: 0;
    transition: color 0.15s, transform 0.15s;
  }
  .nav-entry:hover .nav-arrow { color: var(--blood); transform: translateX(3px); }
  .divider { display: flex; align-items: center; gap: 0.6rem; margin: 1.5rem 0; color: var(--parchment-shadow); }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--parchment-shadow), transparent); }
  .divider span { font-size: 0.8rem; }
  .loading { text-align: center; font-style: italic; color: var(--faded); padding: 2rem 0; font-size: 0.9rem; }
  @media (max-width: 600px) { .page { padding: 1.5rem 1.2rem 2rem; } }
</style>
</head>
<body>
<div class="page">
  <div class="page-title">
    <span class="gm-label">Dungeon Master Navigation</span>
    <h1>Aelenthor</h1>
    <p class="subtitle">Campaign Reference · All Pages</p>
  </div>
  <div id="navRoot"><p class="loading">Loading…</p></div>
</div>

<script>
  const BASE = 'https://pnewnan.github.io/dnd5e-artifacts/';

  fetch(BASE + 'nav.json')
    .then(function(r) { return r.json(); })
    .then(renderIndex)
    .catch(function() {
      document.getElementById('navRoot').innerHTML = '<p class="loading">Navigation unavailable — check console.</p>';
    });

  function renderIndex(data) {
    var DIVIDERS = ['✦', '⁂', '✦', '⁂'];
    var html = '';
    data.sections.forEach(function(sec, i) {
      if (i > 0) html += '<div class="divider"><span>' + (DIVIDERS[i] || '✦') + '</span></div>';
      html += '<div class="nav-section">'
            + '<div class="nav-section-head">' + sec.title + '</div>'
            + '<div class="nav-entries">';
      sec.entries.forEach(function(e) {
        var tgt = e.type === 'asset' ? ' target="_blank"' : '';
        html += '<a class="nav-entry ' + e.type + '" href="' + BASE + e.href + '"' + tgt + '>'
              + '<span class="nav-tag tag-' + e.type + '">' + e.type + '</span>'
              + '<div class="nav-entry-text">'
              + '<span class="nav-entry-name">' + e.name + '</span>'
              + '<span class="nav-entry-desc">' + e.desc + '</span>'
              + '</div>'
              + '<span class="nav-arrow">→</span>'
              + '</a>';
      });
      html += '</div></div>';
    });
    document.getElementById('navRoot').innerHTML = html;
  }
</script>
</body>
</html>
