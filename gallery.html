<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aelenthor — Image Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0806;
    color: #f2e8c9;
    font-family: 'Cormorant Garamond', serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── STAGE ── */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  .slide img {
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* ── CAPTION ── */
  #caption {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1.2rem 5rem 1.2rem 1.5rem;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #caption-section {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(180,140,60,0.7);
    margin-bottom: 0.2rem;
  }
  #caption-title {
    font-size: 1.2rem;
    font-weight: 600;
    color: rgba(242,232,200,0.9);
    line-height: 1.2;
  }

  /* ── COUNTER ── */
  #counter {
    position: fixed;
    top: 1rem;
    right: 1rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: rgba(242,232,200,0.35);
    transition: opacity 0.3s;
  }

  /* ── NAV ARROWS ── */
  .nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 3.5rem;
    height: 3.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: rgba(242,232,200,0.25);
    font-size: 1.6rem;
    transition: color 0.2s, background 0.2s;
    border-radius: 2px;
    z-index: 10;
  }
  .nav-arrow:hover {
    color: rgba(242,232,200,0.85);
    background: rgba(180,140,60,0.1);
  }
  #prev { left: 0.5rem; }
  #next { right: 0.5rem; }

  /* ── SECTION DIVIDER SLIDES ── */
  .divider-slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    background: radial-gradient(ellipse at center, #1a1209 0%, #0a0806 70%);
  }
  .divider-slide.active {
    opacity: 1;
    pointer-events: auto;
  }
  .divider-slide .div-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(180,140,60,0.5);
    margin-bottom: 0.8rem;
  }
  .divider-slide .div-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    color: rgba(242,232,200,0.85);
    letter-spacing: 0.06em;
    text-align: center;
  }
  .divider-slide .div-rule {
    width: 8rem;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(180,140,60,0.5), transparent);
    margin-top: 1rem;
  }

  /* hide chrome on divider slides */
  body.on-divider #caption,
  body.on-divider #counter { opacity: 0; }
</style>
</head>
<body>

<div id="stage"></div>

<div id="caption">
  <div id="caption-section"></div>
  <div id="caption-title"></div>
</div>

<div id="counter"></div>

<div class="nav-arrow" id="prev" onclick="go(-1)">&#8249;</div>
<div class="nav-arrow" id="next" onclick="go(1)">&#8250;</div>

<!-- NAV PANEL -->
<div id="aelNavPanel" style="display:none;position:fixed;inset:0 0 0 auto;z-index:1000;width:min(300px,90vw);background:rgba(8,6,3,0.97);border-left:1px solid rgba(180,140,60,0.3);overflow-y:auto;padding:1.5rem 1.2rem;transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);"></div>
<div id="aelNavBtn" onclick="aelNavOpen()" style="position:fixed;bottom:1rem;right:1rem;z-index:1001;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;background:rgba(13,10,6,0.88);border:1px solid rgba(180,140,60,0.4);padding:0.45rem 0.9rem;color:rgba(242,232,200,0.7);cursor:pointer;user-select:none;transition:color 0.2s;" onmouseover="this.style.color='rgba(242,232,200,1)'" onmouseout="this.style.color='rgba(242,232,200,0.7)'">&#9776; All Pages</div>

  { type: 'divider', title: 'The Blackglass Incident' },

  { src: 'act2/blackglass/orc_gas.png',            title: 'The Deployment — Wind Shifts',        section: 'The Blackglass Incident' },
  { src: 'act2/blackglass/dunnshire_after.png',    title: 'Dunnshire — After',                   section: 'The Blackglass Incident' },

  { type: 'divider', title: 'The Blackglass Laboratory' },
  { src: 'act2/blackglass/viktor_voss_lair.png',   title: 'The Blackglass Laboratory',   section: 'Act 2' },
  { src: 'act2/blackglass/viktor_voss_young.png',  title: 'Viktor Voss — Early Career',  section: 'Act 2' },
  { src: 'act2/blackglass/viktor_voss.png',        title: 'Viktor Voss — The Machinist', section: 'Act 2' },
];

// Count only image slides for the counter
const imgSlides = SLIDES.filter(s => !s.type);
let current = 0;
let imgCounter = 0;

function buildStage() {
  const stage = document.getElementById('stage');
  SLIDES.forEach((slide, i) => {
    if (slide.type === 'divider') {
      const el = document.createElement('div');
      el.className = 'divider-slide';
      el.dataset.index = i;
      el.innerHTML = `<div class="div-label">Aelenthor Campaign</div><div class="div-title">${slide.title}</div><div class="div-rule"></div>`;
      stage.appendChild(el);
    } else {
      const el = document.createElement('div');
      el.className = 'slide';
      el.dataset.index = i;
      const img = document.createElement('img');
      img.src = BASE + slide.src;
      img.alt = slide.title;
      el.appendChild(img);
      stage.appendChild(el);
    }
  });
}

function show(index) {
  // clamp
  if (index < 0) index = 0;
  if (index >= SLIDES.length) index = SLIDES.length - 1;
  current = index;

  document.querySelectorAll('.slide, .divider-slide').forEach(el => el.classList.remove('active'));
  const target = document.querySelector(`[data-index="${current}"]`);
  if (target) target.classList.add('active');

  const slide = SLIDES[current];
  if (slide.type === 'divider') {
    document.body.classList.add('on-divider');
  } else {
    document.body.classList.remove('on-divider');
    document.getElementById('caption-section').textContent = slide.section;
    document.getElementById('caption-title').textContent = slide.title;
    // update counter using only image slides
    const imgIndex = imgSlides.indexOf(slide);
    document.getElementById('counter').textContent = `${imgIndex + 1} / ${imgSlides.length}`;
  }

  document.getElementById('prev').style.opacity = current === 0 ? '0.2' : '1';
  document.getElementById('next').style.opacity = current === SLIDES.length - 1 ? '0.2' : '1';
}

function go(dir) {
  show(current + dir);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp')  go(-1);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
});

// Touch swipe
let touchX = null;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
  touchX = null;
});

buildStage();
show(0);
</script>
</body>
</html>
